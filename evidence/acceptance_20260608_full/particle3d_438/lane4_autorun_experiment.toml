# Notebook-equivalent 10 million particle 3D experiment.
# Matches C:/Users/Glyn/Documents/Untitled-1.ipynb FPGA path:
# 8x8x8 field, deterministic Gaussian particle superposition, then 438 FPGA steps.

[meta]
name = "notebook_10M_particles"
description = "3D particle superposition path derived from Untitled-1.ipynb"

[experiment]
mode = "particle_superposition_3d"

auto_run = true
[notebook_source]
path = "C:/Users/Glyn/Documents/Untitled-1.ipynb"

[lattice]
num_sites = 512
nx = 8
ny = 8
nz = 8

[particle_superposition_3d]
n_particles = 10000000
batch_particles = 10000
rng_seed = 42
nx = 8
ny = 8
nz = 8
D = 0.8
V_coeff = 0.6
T_total = 35.0
dt_fpga = 0.08
steps = 438
sigma = 0.5
L = 1.0
potential_center = 0.5
potential_width = 0.2
write_field_csv = true
accum_mode = "full_512"
accum_lanes = 4
site_lanes = 1
wal_policy = "full"
binary_output_first = false

[coefficients]
# Derived from notebook-equivalent setup:
# v2 = dt_fpga * D = 0.064, gamma/eta/zeta/lambda are zero for this kernel.
v2 = 0.064
eta = 0.0
zeta = 0.0
lambda = 0.0
gamma = 0.0
cg2 = 1.0
epsilon = 0.0
step_period = 0
spi3_push_period = 7
spi3_num_sites = 512

[timing]
tau_divider = 49999999
num_steps = 438
checkpoint_every = 100
poll_interval_us = 10000

[logging]
energy_log = true
snapshot_every = 0
wal_stream = true
wal_stream_min_interval_us = 5000

[outputs]
root = "0:/output"
summary = "summary.txt"
json = "result.jsn"
field_bin = "field_final.bin"
field_csv = "field_final.csv"
energy = "energy.csv"
progress = "progress.bin"
wal_bin = "wal.bin"
wal_csv = "walst.csv"

[recovery]
snapshot_fields = 6
depth = 128
restore_audit = true
checkpoint_every_layers = 1000

[robustness]
max_consecutive_errors = 5
