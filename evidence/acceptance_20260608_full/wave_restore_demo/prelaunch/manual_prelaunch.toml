[meta]
name = "mts_2d_dense"
description = "Dense-compressed 2D MTS validation run"

[experiment]
mode = "mts_2d"
dimension_kind = "mts_2d"
gmw_min_thickness = "state_words"
packing = "dense_compressed"
logical_shape = "16x16"
physical_shape = "8x8x8"

auto_run = false
[lattice]
num_sites = 512
nx = 8
ny = 8
nz = 8

[kernel]
laplacian_coeff = 0.8
potential_coeff = 0.6
potential_center = 50.0
potential_width = 10.0
normalize_each_timestep = true

[timing]
tau_divider = 49999999
num_steps = 1
checkpoint_every = 100
poll_interval_us = 10000

[logging]
energy_log = false
snapshot_every = 0
wal_stream = false
wal_stream = false

[recovery]
snapshot_fields = 6
depth = 128
restore_audit = true
checkpoint_every_layers = 1000

[robustness]
max_consecutive_errors = 5

